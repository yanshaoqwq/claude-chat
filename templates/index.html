<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Chat</title>
<link rel="stylesheet" href="/static/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/styles/github.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked@14.1.3/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/common.min.js"></script>
</head>
<body>
<div class="bg-layer" id="bgLayer"></div>
<div class="bg-tint"></div>

<div class="app">
  <button id="sidebarToggle" class="sidebar-toggle" aria-label="切换侧栏">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
  </button>

  <aside class="sidebar glass" id="sidebar">
    <div class="sidebar-top">
      <div class="brand">
        <span class="brand-dot"></span>
        <span>Claude Chat</span>
      </div>
      <button id="newChatBtn" class="new-chat" title="新建对话">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        新建对话
      </button>
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input type="search" id="searchInput" placeholder="搜索对话…">
        <button id="searchClear" class="search-clear" title="清除" hidden>
          <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </button>
      </div>
    </div>

    <div class="conv-list-wrap">
      <div class="conv-list" id="convList"></div>
    </div>

    <div class="sidebar-bottom">
      <button id="menuBtn" class="menu-fab" title="菜单">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7h4M10 7h11M3 12h4M10 12h11M3 17h4M10 17h11"/></svg>
      </button>
    </div>
  </aside>

  <main class="chat">
    <header class="chat-header glass">
      <div class="header-left">
        <div class="title-wrap">
          <button id="renameTitleBtn" class="title-btn" title="点击重命名">
            <span id="convTitle">新对话</span>
            <svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <input id="titleInput" class="title-input" type="text" hidden>
        </div>
        <div class="mode-segment" id="modeSegment">
          <button class="mode-seg-btn" data-mode="single">Direct</button>
          <button class="mode-seg-btn" data-mode="dual">Dual</button>
        </div>
      </div>
      <div class="header-center">
        <div class="model-pickers" id="modelPickers"></div>
      </div>
      <div class="header-right">
        <span id="convStat" class="chat-meta">0 条消息</span>
      </div>
    </header>

    <div id="messages" class="messages"></div>

    <div class="composer-wrap">
      <div class="composer glass">
        <div id="attachments" class="attachments" hidden></div>
        <textarea id="input" rows="1" placeholder="发送消息给 Claude…"></textarea>
        <div class="composer-bar">
          <div class="composer-left">
            <button id="webSearchBtn" class="chip" title="启用联网搜索">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>
              <span>联网</span>
            </button>
            <button id="attachBtn" class="chip" title="上传 PDF / DOCX / 图片 / 文本">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
              <span>附件</span>
            </button>
            <input type="file" id="attachFile" accept=".pdf,.docx,.txt,.md,.markdown,.log,.csv,.json,.py,.js,.ts,.html,.css,.yaml,.yml,.xml,.png,.jpg,.jpeg,.gif,.webp,image/*" hidden multiple>
          </div>
          <div class="composer-actions">
            <span class="composer-hint">Ctrl/⌘+Enter 发送</span>
            <button id="stopBtn" class="danger" disabled>
              <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
              停止
            </button>
            <button id="sendBtn" class="primary">
              发送
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="modalRoot"></div>
<div id="toast" class="toast"></div>

<template id="settingsTpl">
  <div class="modal-card glass">
    <header class="modal-header">
      <h2>设置</h2>
      <button class="icon close-btn" data-close><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
    </header>
    <nav class="settings-tabs">
      <button class="settings-tab active" data-tab="model">模型配置</button>
      <button class="settings-tab" data-tab="web">Web 端设置</button>
    </nav>
    <div class="modal-body">
      <div class="tab-panel active" data-panel="model">
        <section class="form-section">
          <h3>提供商管理</h3>
          <p class="hint">添加任意数量的提供商，每个提供商保存自己的接口地址、密钥和模型列表。要换新模型时直接编辑模型列表即可。</p>
          <div id="m_providersList" class="providers-list"></div>
          <div class="btn-row" style="margin-top:8px">
            <button id="m_addProvider">+ 添加提供商</button>
          </div>
        </section>

        <section class="form-section">
          <h3>当前模型选择</h3>
          <div class="field-row">
            <label class="field"><span>单模型 · 提供商</span>
              <select id="m_activeProvider"></select>
            </label>
            <label class="field"><span>单模型 · 模型</span>
              <select id="m_activeModel"></select>
            </label>
          </div>
          <div class="field-row">
            <label class="field"><span>双模型 A · 提供商</span>
              <select id="m_providerA"></select>
            </label>
            <label class="field"><span>双模型 A · 模型</span>
              <select id="m_modelA"></select>
            </label>
          </div>
          <div class="field-row">
            <label class="field"><span>双模型 B · 提供商</span>
              <select id="m_providerB"></select>
            </label>
            <label class="field"><span>双模型 B · 模型</span>
              <select id="m_modelB"></select>
            </label>
          </div>
        </section>

        <section class="form-section">
          <h3>联网搜索</h3>
          <label class="field"><span>搜索 API URL</span>
            <input type="text" id="m_searchUrl" placeholder="https://apii.xianyuw.cn/api/v1/grok-search">
          </label>
          <label class="field"><span>搜索 API Key</span>
            <input type="password" id="m_searchKey" placeholder="sk-...">
          </label>
          <p class="hint">填好后，在输入框左侧点"联网"按钮即可开启。模型会自行判断何时需要搜索。</p>
        </section>

        <section class="form-section">
          <h3>生成参数</h3>
          <div class="field-row">
            <label class="field"><span>Effort</span>
              <select id="m_effort">
                <option value="low">low</option><option value="medium">medium</option>
                <option value="high">high</option><option value="xhigh">xhigh</option>
              </select>
            </label>
            <label class="field"><span>Max Tokens</span>
              <input type="number" id="m_maxTokens" min="1024" max="200000" step="1024">
            </label>
          </div>
        </section>

        <section class="form-section">
          <h3>System Prompt（全局默认）</h3>
          <textarea id="m_system" rows="6" placeholder="**系统提示词到此结束**"></textarea>
        </section>
      </div>

      <div class="tab-panel" data-panel="web">
        <section class="form-section">
          <h3>服务地址</h3>
          <p class="hint">修改后需重启服务才能生效。</p>
          <div class="field-row">
            <label class="field"><span>Host</span>
              <input type="text" id="m_host" placeholder="0.0.0.0">
            </label>
            <label class="field"><span>Port</span>
              <input type="number" id="m_port" min="1" max="65535" placeholder="5000">
            </label>
          </div>
        </section>

        <section class="form-section">
          <h3>数据</h3>
          <div class="btn-row">
            <button id="m_export">导出全部</button>
            <button id="m_import">导入</button>
            <button id="m_clearAll" class="danger">清空全部</button>
            <input type="file" id="m_importFile" accept="application/json" hidden>
          </div>
        </section>
      </div>
    </div>
    <footer class="modal-footer">
      <button data-close class="ghost">关闭</button>
      <button id="m_save" class="primary">保存</button>
    </footer>
  </div>
</template>

<template id="bgTpl">
  <div class="modal-card glass">
    <header class="modal-header">
      <h2>个性化</h2>
      <button class="icon close-btn" data-close><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
    </header>
    <div class="modal-body">
      <section class="form-section">
        <h3>背景</h3>
        <div class="bg-grid" id="bgGrid"></div>
        <div class="btn-row" style="margin-top:14px">
          <button id="bgUpload">上传自定义图片</button>
          <input type="file" id="bgFile" accept="image/*" hidden>
          <span class="hint" style="margin-left:auto">最大约 4MB；存于本地浏览器</span>
        </div>
        <label class="field" style="margin-top:10px">
          <span>UI 透明度 <em id="opVal">70%</em></span>
          <input type="range" id="opacity" min="40" max="95" step="5">
        </label>
      </section>

      <section class="form-section">
        <h3>用户身份</h3>
        <div class="field-row">
          <label class="field"><span>显示名</span>
            <input type="text" id="m_userName" placeholder="You">
          </label>
          <label class="field"><span>头像文字</span>
            <input type="text" id="m_userAvatar" maxlength="2" placeholder="你">
          </label>
        </div>
        <div class="avatar-upload">
          <div class="avatar-preview" id="m_userAvatarPreview"></div>
          <div class="btn-row">
            <button type="button" id="m_userAvatarUpload">上传头像图片</button>
            <button type="button" id="m_userAvatarClear" class="ghost">清除</button>
            <input type="file" id="m_userAvatarFile" accept="image/*" hidden>
          </div>
        </div>
      </section>

      <section class="form-section">
        <h3>AI 身份</h3>
        <div class="field-row">
          <label class="field"><span>显示名</span>
            <input type="text" id="m_aiName" placeholder="Claude">
          </label>
          <label class="field"><span>头像文字</span>
            <input type="text" id="m_aiAvatar" maxlength="2" placeholder="C">
          </label>
        </div>
        <div class="avatar-upload">
          <div class="avatar-preview" id="m_aiAvatarPreview"></div>
          <div class="btn-row">
            <button type="button" id="m_aiAvatarUpload">上传头像图片</button>
            <button type="button" id="m_aiAvatarClear" class="ghost">清除</button>
            <input type="file" id="m_aiAvatarFile" accept="image/*" hidden>
          </div>
        </div>
      </section>

      <section class="form-section">
        <h3>等待提示</h3>
        <label class="field">
          <span>首 token 到达前显示</span>
          <input type="text" id="m_waitingText" placeholder="正在思考…">
        </label>
      </section>
    </div>
    <footer class="modal-footer">
      <button data-close class="primary">完成</button>
    </footer>
  </div>
</template>

<template id="powerTpl">
  <div class="modal-card glass" style="max-width:420px">
    <header class="modal-header">
      <h2>服务管理</h2>
      <button class="icon close-btn" data-close><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
    </header>
    <div class="modal-body">
      <p class="hint" style="margin:0 0 14px">重启或关闭运行中的服务。重启后请等待几秒再刷新页面。</p>
      <div class="power-actions">
        <button id="m_restart" class="primary">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-3-6.7M21 4v5h-5"/></svg>
          重启服务
        </button>
        <button id="m_shutdown" class="danger">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>
          关闭服务
        </button>
      </div>
    </div>
    <footer class="modal-footer">
      <button data-close class="ghost">取消</button>
    </footer>
  </div>
</template>

<template id="confirmTpl">
  <div class="modal-card glass dialog-card">
    <header class="modal-header">
      <h2 class="dialog-title">确认</h2>
    </header>
    <div class="modal-body">
      <p class="dialog-message"></p>
    </div>
    <footer class="modal-footer">
      <button class="ghost dialog-cancel">取消</button>
      <button class="primary dialog-ok">确定</button>
    </footer>
  </div>
</template>

<script src="/static/render.js"></script>
<script src="/static/stream.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
